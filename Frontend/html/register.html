<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MY STOCK</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>
    <div class="login-card">
        <header>
            <div class="brand">MY STOCK</div>
            <h1>สร้างบัญชีใหม่</h1>
        </header>

        <form id="registerForm">
            <div class="input-row">
                <div class="input-field">
                    <label>ชื่อ</label>
                    <input type="text" id="FirstName" placeholder="ชื่อ" required>
                </div>
                <div class="input-field">
                    <label>นามสกุล</label>
                    <input type="text" id="LastName" placeholder="นามสกุล" required>
                </div>
            </div>

            <div class="input-field">
                <label>อีเมล</label>
                <input type="email" id="email" placeholder="example@mystock.com" required>
            </div>

            <div class="input-field">
                <label>รหัสผ่าน</label>
                <input type="password" id="password" placeholder="อย่างน้อย 8 ตัวอักษร" required>
                <div id="error" class="error-text">กรุณากรอกข้อมูลให้ครบถ้วน</div>
            </div>

            <button type="submit">สมัครสมาชิก</button>
        </form>

        <div class="separator"><span>หรือ</span></div>

        <div class="register-hint">
            มีบัญชีผู้ใช้แล้ว? <a href="../index.html">เข้าสู่ระบบที่นี่</a>
        </div>
    </div>
</div>

<script src="../js/register.js"></script>
<script>
const _w=document.querySelector('.login-wrapper');
const _c=['#E8B4E8','#FFB3C6','#C9A8E8','#FFCCD5','#D4A8E8'];
for(let i=0;i<14;i++){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:loginDotRise linear infinite;width:${Math.random()*5+3}px;height:${Math.random()*5+3}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;background:${_c[Math.floor(Math.random()*_c.length)]};opacity:0.25;animation-duration:${Math.random()*7+5}s;animation-delay:${Math.random()*5}s;`;
  _w.appendChild(d);
}
</script>
</body>
</html>
