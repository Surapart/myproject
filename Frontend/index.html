<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MY STOCK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <header>
            <div class="brand">MY STOCK</div>
            <h1>เข้าสู่ระบบ</h1>
        </header>

        <form id="loginForm">
            <div class="input-field">
                <label>อีเมล</label>
                <input type="email" id="email" placeholder="example@mystock.com" required>
            </div>

            <div class="input-field">
                <label>รหัสผ่าน</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div id="error" class="error-text">อีเมลหรือรหัสผ่านไม่ถูกต้อง</div>
            </div>

            <button type="submit">เข้าสู่ระบบ</button>
        </form>

        <div class="separator"><span>หรือ</span></div>

        <div class="register-hint">
            ยังไม่มีบัญชีผู้ใช้? <a href="register.html">สมัครสมาชิกที่นี่</a>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
